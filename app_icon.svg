<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Card 1 (Back-Left) -->
  <g filter="url(#shadow)">
    <rect x="86" y="86" width="240" height="160" rx="8" fill="#FFFFFF" stroke="#C4C7CC" stroke-width="1"/>
    <!-- Card 1 Center X: 86+120=206, Y: 86+80=166. Symbols: (156,146), (206,146), (256,146) -->
    <rect x="136" y="146" width="40" height="40" fill="#2196F3"/>
    <rect x="186" y="146" width="40" height="40" fill="#2196F3"/>
    <rect x="236" y="146" width="40" height="40" fill="#2196F3"/>
  </g>

  <!-- Card 2 (Middle) -->
  <g filter="url(#shadow)">
    <rect x="136" y="176" width="240" height="160" rx="8" fill="#FFFFFF" stroke="#C4C7CC" stroke-width="1"/>
    <!-- Card 2 Center X: 136+120=256, Y: 176+80=256. Symbols: (231,256), (281,256) -->
    <path d="M 231 236 L 251 276 L 211 276 Z" fill="#FF9800"/>
    <path d="M 281 236 L 301 276 L 261 276 Z" fill="#FF9800"/>
  </g>

  <!-- Card 3 (Front-Right) -->
  <g filter="url(#shadow)">
    <rect x="186" y="266" width="240" height="160" rx="8" fill="#FFFFFF" stroke="#C4C7CC" stroke-width="1"/>
    <!-- Card 3 Center X: 186+120=306, Y: 266+80=346. -->
    <circle cx="306" cy="346" r="30" fill="#F44336"/>
  </g>
</svg>
