<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Card 1 (Back-Left) -->
  <g filter="url(#shadow)">
    <rect x="64" y="64" width="240" height="160" rx="8" fill="#FFFFFF" stroke="#C4C7CC" stroke-width="1"/>
    <!-- Center: 184, 144. Squares 50x50 with 10px gap. -->
    <rect x="99" y="119" width="50" height="50" fill="#2196F3"/>
    <rect x="159" y="119" width="50" height="50" fill="#2196F3"/>
    <rect x="219" y="119" width="50" height="50" fill="#2196F3"/>
  </g>

  <!-- Card 2 (Middle) -->
  <g filter="url(#shadow)">
    <rect x="136" y="176" width="240" height="160" rx="8" fill="#FFFFFF" stroke="#C4C7CC" stroke-width="1"/>
    <!-- Center: 256, 256. Triangles 50x50 with 10px gap. -->
    <path d="M 201 281 L 226 231 L 251 281 Z" fill="#FF9800"/>
    <path d="M 261 281 L 286 231 L 311 281 Z" fill="#FF9800"/>
  </g>

  <!-- Card 3 (Front-Right) -->
  <g filter="url(#shadow)">
    <rect x="208" y="288" width="240" height="160" rx="8" fill="#FFFFFF" stroke="#C4C7CC" stroke-width="1"/>
    <!-- Center: 328, 368. Circle radius 40. -->
    <circle cx="328" cy="368" r="40" fill="#F44336"/>
  </g>
</svg>
